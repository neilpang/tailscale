name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # needed to attach artifacts to releases on tag push

jobs:
  build:
    name: ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows x64
            os: windows-latest
            rid: win-x64
          - label: macOS arm64
            os: macos-latest
            rid: osx-arm64
    runs-on: ${{ matrix.os }}
    env:
      DOTNET_NOLOGO: 1
      DOTNET_CLI_TELEMETRY_OPTOUT: 1

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore TailscaleClient.slnx

      - name: Build
        run: dotnet build TailscaleClient.slnx --configuration Release --no-restore

      - name: Publish UI (self-contained, single file)
        run: >
          dotnet publish src/TailscaleClient.UI/TailscaleClient.UI.csproj
          --configuration Release
          --runtime ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish/${{ matrix.rid }}

      # ─────────────────── Windows packaging ───────────────────

      - name: Zip Windows build
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $version = if ($env:GITHUB_REF -like 'refs/tags/v*') { $env:GITHUB_REF -replace 'refs/tags/v', '' } else { 'dev' }
          $zip = "TailscaleClient-$version-${{ matrix.rid }}.zip"
          Compress-Archive -Path publish/${{ matrix.rid }}/* -DestinationPath $zip
          "ARTIFACT=$zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      # ─────────────────── macOS packaging (.app bundle) ───────────────────

      - name: Build .app bundle
        if: startsWith(matrix.os, 'macos')
        shell: bash
        run: |
          set -euo pipefail
          version="dev"
          if [[ "${GITHUB_REF:-}" == refs/tags/v* ]]; then
            version="${GITHUB_REF#refs/tags/v}"
          fi

          app="TailscaleClient.app"
          rm -rf "$app"
          mkdir -p "$app/Contents/MacOS"
          mkdir -p "$app/Contents/Resources"
          cp -R publish/${{ matrix.rid }}/. "$app/Contents/MacOS/"
          chmod +x "$app/Contents/MacOS/TailscaleClient"

          cat > "$app/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleName</key>             <string>Tailscale</string>
              <key>CFBundleDisplayName</key>      <string>Tailscale</string>
              <key>CFBundleIdentifier</key>       <string>org.tailscaleclient.avalonia</string>
              <key>CFBundleExecutable</key>       <string>TailscaleClient</string>
              <key>CFBundleVersion</key>          <string>${version}</string>
              <key>CFBundleShortVersionString</key><string>${version}</string>
              <key>CFBundlePackageType</key>      <string>APPL</string>
              <key>CFBundleInfoDictionaryVersion</key><string>6.0</string>
              <key>LSMinimumSystemVersion</key>   <string>11.0</string>
              <key>NSHighResolutionCapable</key>  <true/>
              <key>LSApplicationCategoryType</key><string>public.app-category.utilities</string>
          </dict>
          </plist>
          PLIST

          # Ad-hoc sign so the app launches on the user's Mac without the
          # right-click-Open workaround. Real Developer ID signing would
          # require an Apple cert + secrets; this is good enough for hobby use.
          codesign --force --deep --sign - "$app"

          # Strip extended attrs so the bundle doesn't carry the quarantine
          # bit through the zip and back out.
          xattr -cr "$app" || true

          zip="TailscaleClient-${version}-${{ matrix.rid }}.zip"
          ditto -c -k --sequesterRsrc --keepParent "$app" "$zip"
          echo "ARTIFACT=$zip" >> "$GITHUB_ENV"

      # ─────────────────── Upload ───────────────────

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: TailscaleClient-${{ matrix.rid }}
          path: ${{ env.ARTIFACT }}
          if-no-files-found: error
          retention-days: 30

      - name: Attach to release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ env.ARTIFACT }}
          generate_release_notes: true
          fail_on_unmatched_files: true
